name: Memory Benchmark

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  memory-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --extra test

      - name: Run memory benchmark gate
        env:
          RSS_P95_BUDGET_MB: "80"
          RSS_PEAK_BUDGET_MB: "120"
        run: |
          uv run python scripts/memory_benchmark.py \
            --samples 30 \
            --rss-p95-budget-mb "${RSS_P95_BUDGET_MB}" \
            --rss-peak-budget-mb "${RSS_PEAK_BUDGET_MB}" \
            --max-entries-per-block 200 \
            --output .benchmarks/memory-benchmark-report.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: memory-benchmark-report
          path: .benchmarks/memory-benchmark-report.json
